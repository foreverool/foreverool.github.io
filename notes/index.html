  <canvas id="mouse-follow-canvas"></canvas>
  
  
  <script>
    window.mouseFollowOptions = {
      ballCount:  15 ,
      maxBallSize:  10 ,
      minBallSize:  3 ,
      maxSpeed:  5 ,
      colorMode: "rainbow",
      primaryColor: "#3B82F6",
      fadeOutSpeed:  0.03 ,
      interactive:  true ,
      mobileEnabled:  true ,
      mobileSensitivity:  1 ,
      mobileBallCount:  8 ,
      mobileBallSize:  8 
    };
  </script>
  
/**
 * 鼠标跟随彩色球效果 - 移动端优化版
 * 用于在Toha主题中添加鼠标跟随的彩色球动画效果，优化了移动端体验
 */

<script>
class MouseFollowEffect {
    constructor(options = {}) {
        
        this.config = {
            ballCount: options.ballCount || 15,      
            maxBallSize: options.maxBallSize || 10, 
            minBallSize: options.minBallSize || 3,  
            maxSpeed: options.maxSpeed || 5,        
            colorMode: options.colorMode || 'rainbow', 
            primaryColor: options.primaryColor || '#3B82F6', 
            fadeOutSpeed: options.fadeOutSpeed || 0.03, 
            interactive: options.interactive !== false, 
            mobileEnabled: options.mobileEnabled !== false, 
            mobileSensitivity: options.mobileSensitivity || 1, 
            mobileBallCount: options.mobileBallCount || 8, 
            mobileBallSize: options.mobileBallSize || 8, 
            ...options
        };

        this.canvas = null;
        this.ctx = null;
        this.balls = [];
        this.mouseX = 0;
        this.mouseY = 0;
        this.mouseMoving = false;
        this.animationId = null;
        this.isDarkMode = false;
        this.isMobile = false; 
        this.touchActive = false; 
        this.lastTouchTime = 0; 
        this.touchCooldown = 50; 
        this.lastCreateTime = 0; 
        this.createInterval = 100; 

        
        this.init();
    }

    

    init() {
   
        
        
        this.detectMobile();
        
        if (this.isMobile){
            return;
        }

        
        if (this.isMobile && !this.config.mobileEnabled) {
            console.log('MouseFollowEffect: Disabled on mobile devices');
            return;
        }
        
        
        
        this.canvas = document.getElementById('mouse-follow-canvas');
        if (!this.canvas) {
            console.error('MouseFollowEffect: Canvas element not found');
            return;
        }

        this.ctx = this.canvas.getContext('2d');
        
        
        this.resizeCanvas();
        
        
        window.addEventListener('resize', () => this.resizeCanvas());
        
        
        document.addEventListener('mousemove', (e) => this.handleMouseMove(e));
        
        
        this.setupTouchEvents();
        
        
        this.checkDarkMode();
        const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        darkModeMediaQuery.addEventListener('change', (e) => {
            this.isDarkMode = e.matches;
        });
        
        
        this.animate();
        
        
        let mouseTimeout;
        document.addEventListener('mousemove', () => {
            this.mouseMoving = true;
            clearTimeout(mouseTimeout);
            mouseTimeout = setTimeout(() => {
                this.mouseMoving = false;
            }, 100);
        });
    }

    

    detectMobile() {
        
        this.isMobile = (
           window.innerWidth <= 768
        );
        
        
        if (this.isMobile) {
            this.config.ballCount = this.config.mobileBallCount;
            this.config.maxBallSize = this.config.mobileBallSize;
            
            this.config.fadeOutSpeed *= 0.8;
            
        }
    }

    

    setupTouchEvents() {
        
        document.addEventListener('touchstart', (e) => this.handleTouchStart(e), { passive: false });
        
        
        document.addEventListener('touchmove', (e) => this.handleTouchMove(e), { passive: false });
        
        
        document.addEventListener('touchend', (e) => this.handleTouchEnd(e), { passive: true });
        
        
        document.addEventListener('touchcancel', (e) => this.handleTouchEnd(e), { passive: true });
    }

    

    resizeCanvas() {
        
        requestAnimationFrame(() => {
            if (!this.canvas) return;
            
            
            const width = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
            const height = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
            
            this.canvas.width = width;
            this.canvas.height = height;
        });
    }

    

    handleMouseMove(e) {
        
        if (this.touchActive) return;
        
        this.mouseX = e.clientX;
        this.mouseY = e.clientY;
        
        
        const now = Date.now();
        if (this.mouseMoving && this.config.interactive && (now - this.lastCreateTime > this.createInterval)) {
            this.createBall();
            this.lastCreateTime = now;
        }
    }

    

    handleTouchStart(e) {
        
        e.preventDefault();
        
        this.touchActive = true;
        const touch = e.touches[0];
        this.mouseX = touch.clientX;
        this.mouseY = touch.clientY;
        
        
        this.createBall();
        this.lastTouchTime = Date.now();
    }

    

    handleTouchMove(e) {
        
        e.preventDefault();
        
        if (!this.touchActive) return;
        
        const touch = e.touches[0];
        const currentTime = Date.now();
        
        
        const deltaX = touch.clientX - this.mouseX;
        const deltaY = touch.clientY - this.mouseY;
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
        
        
        this.mouseX = touch.clientX;
        this.mouseY = touch.clientY;
        
        
        
        const minDistance = 10 * this.config.mobileSensitivity;
        const timeSinceLastTouch = currentTime - this.lastTouchTime;
        
        if (distance > minDistance && timeSinceLastTouch > this.touchCooldown) {
            this.createBall();
            this.lastTouchTime = currentTime;
        }
    }

    

    handleTouchEnd(e) {
        this.touchActive = false;
    }

    

    checkDarkMode() {
        
        this.isDarkMode = document.documentElement.classList.contains('dark') || 
                          document.body.classList.contains('dark') ||
                          window.matchMedia('(prefers-color-scheme: dark)').matches;
    }

    

    createBall() {
        
        if (this.balls.length >= this.config.ballCount) {
            return;
        }
        
        
        const size = Math.random() * (this.config.maxBallSize - this.config.minBallSize) + this.config.minBallSize;
        
        
        let color;
        switch (this.config.colorMode) {
            case 'monochrome':
                color = this.config.primaryColor;
                break;
            case 'pastel':
                color = this.getPastelColor();
                break;
            case 'rainbow':
            default:
                color = this.getRainbowColor();
                break;
        }
        
        
        const ball = {
            x: this.mouseX,
            y: this.mouseY,
            size: size,
            color: color,
            opacity: 1,
            
            speedX: (Math.random() - 0.5) * this.config.maxSpeed * (this.isMobile ? 1.2 : 1),
            speedY: (Math.random() - 0.5) * this.config.maxSpeed * (this.isMobile ? 1.2 : 1),
            
            fadeOutSpeed: this.config.fadeOutSpeed * (Math.random() * 0.5 + 0.75)
        };
        
        this.balls.push(ball);
    }

    

    getRainbowColor() {
        const hue = Math.random() * 360;
        const saturation = this.isDarkMode ? '70%' : '80%';
        const lightness = this.isDarkMode ? '60%' : '70%';
        return `hsl(${hue}, ${saturation}, ${lightness})`;
    }

    

    getPastelColor() {
        const hue = Math.random() * 360;
        const saturation = '60%';
        const lightness = this.isDarkMode ? '70%' : '85%';
        return `hsl(${hue}, ${saturation}, ${lightness})`;
    }

    

    updateBalls() {
        for (let i = this.balls.length - 1; i >= 0; i--) {
            const ball = this.balls[i];
            
            
            ball.x += ball.speedX;
            ball.y += ball.speedY;
            
            
            ball.speedY += 0.05;
            
            
            ball.speedX *= 0.98;
            ball.speedY *= 0.98;
            
            
            ball.opacity -= ball.fadeOutSpeed;
            
            
            if (ball.opacity <= 0) {
                this.balls.splice(i, 1);
            }
        }
    }

    

    drawBalls() {
        
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        
        this.balls.forEach(ball => {
            
            this.ctx.beginPath();
            this.ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            this.ctx.fillStyle = ball.color;
            this.ctx.globalAlpha = ball.opacity;
            this.ctx.fill();
            this.ctx.globalAlpha = 1;
            
            
            this.ctx.beginPath();
            this.ctx.arc(ball.x, ball.y, ball.size * 1.2, 0, Math.PI * 2);
            this.ctx.fillStyle = ball.color;
            this.ctx.globalAlpha = ball.opacity * 0.3;
            this.ctx.fill();
            this.ctx.globalAlpha = 1;
        });
    }

    

    animate() {
        
        if (this.balls.length === 0) {
            this.animationId = requestAnimationFrame(() => this.animate());
            return;
        }
        
        this.updateBalls();
        this.drawBalls();
        this.animationId = requestAnimationFrame(() => this.animate());
    }

    

    destroy() {
        if (this.animationId) {
            cancelAnimationFrame(this.animationId);
        }
        
        
        window.removeEventListener('resize', () => this.resizeCanvas());
        document.removeEventListener('mousemove', (e) => this.handleMouseMove(e));
        document.removeEventListener('touchstart', (e) => this.handleTouchStart(e));
        document.removeEventListener('touchmove', (e) => this.handleTouchMove(e));
        document.removeEventListener('touchend', (e) => this.handleTouchEnd(e));
        document.removeEventListener('touchcancel', (e) => this.handleTouchEnd(e));
        
        
        if (this.ctx && this.canvas) {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        }
    }
}


document.addEventListener('DOMContentLoaded', () => {
    
    const options = window.mouseFollowOptions || {};
    
    
    window.mouseFollowEffect = new MouseFollowEffect(options);
});
</script>
